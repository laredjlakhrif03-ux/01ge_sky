# ── Shared environment variables for Django ────────────────────────────────────
x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: backend.settings
  SECRET_KEY: "django-insecure-pg)jn*v*t3i)0vupo6i!g^ecdt#8(4c!@n%%-^8@#=922ba8lk"
  DEBUG: "True"
  ALLOWED_HOSTS: "*"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/0"

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Redis  (message broker + celery result backend)
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Django backend  (Gunicorn / port 8001)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *django-env
    volumes:
      # Persist the SQLite database outside the container
      - sqlite_data:/app
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python seed.py &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8001 --workers 2 --timeout 120"

  # ─────────────────────────────────────────────────────────────────────────────
  # Celery worker  (background task processing)
  # ─────────────────────────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *django-env
    volumes:
      - sqlite_data:/app
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A backend worker --loglevel=info --concurrency=2

  # ─────────────────────────────────────────────────────────────────────────────
  # Celery Beat  (scheduled tasks)
  # ─────────────────────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *django-env
    volumes:
      - sqlite_data:/app
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A backend beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend  (nginx serving HTML/JS/CSS + /api proxy → backend)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      # Serve the static frontend files
      - ./dashboard.html:/usr/share/nginx/html/dashboard.html:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./dashboard.js:/usr/share/nginx/html/dashboard.js:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./dashboard.css:/usr/share/nginx/html/dashboard.css:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
      # nginx config with /api proxy
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  sqlite_data:
